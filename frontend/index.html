<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="IntelliPath — AI-Powered Study & Career Guidance Platform. Smart study tools, AI chatbot, career guidance and teacher ERP." />
    <meta name="theme-color" content="#0A0B0F" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title"       content="IntelliPath — Neural Learning Platform" />
    <meta property="og:description" content="AI-Powered Study & Career Guidance Platform" />
    <meta property="og:type"        content="website" />

    <!-- Preconnect to reduce font blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Load fonts with display=swap to prevent CLS and render blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback for no-JS -->
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Prevent layout shift from fonts -->
    <style>
      body {
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        background: #0A0B0F;
        margin: 0;
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>

    <script type="module" src="/src/main.jsx"></script>
